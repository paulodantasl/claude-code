# Public bidding sources — Tampa Bay region + Lee County, Florida.
#
# "Tampa Bay Area" here = the six-county Tampa Bay Regional Planning Council
# region (Citrus, Hernando, Hillsborough, Manatee, Pasco, Pinellas), plus
# Lee County and its cities as requested.
#
# Source platform key:
#   sam_gov — SAM.gov federal Opportunities REST API (needs SAM_GOV_API_KEY)
#   rss     — RSS / Atom procurement feed (no key, no browser)
#   ai      — AI-assisted extraction from the portal page (needs ANTHROPIC_API_KEY)
#
# Almost every local government here posts on a third-party eProcurement
# platform (OpenGov, Bonfire/Euna, DemandStar, IonWave, ProcureWare, BidNet) or
# a CivicPlus "Bids.aspx" page. The `ai` source loads the public listing page
# and lets Claude extract open solicitations. The hosting platform for each is
# noted in a comment. URLs were researched June 2026 — re-check if a portal moves.

sources:

  # ── Federal ──────────────────────────────────────────────────────────────
  - id: sam_gov
    name: "SAM.gov (Federal)"
    type: sam_gov
    # api_key from SAM_GOV_API_KEY; naics_codes/states inherited from criteria.yaml

  # ── OpenGov Procurement ────────────────────────────────────────────────────
  # OpenGov's REST API needs an agency API key, which vendor accounts cannot
  # generate — so we instead read each agency's PUBLIC OpenGov portal page
  # (no login required) with browser rendering (render: true). Those agency
  # entries are in their county sections below. If you ever obtain an agency
  # API key, set OPENGOV_API_KEY and re-enable this single API source instead:
  #
  # - id: opengov
  #   name: "OpenGov Procurement"
  #   type: opengov
  #   state: FL
  #   # api_key from OPENGOV_API_KEY; email from OPENGOV_EMAIL

