# Pending permits / projects to monitor for status updates.
#
# Add one entry per permit you have in flight. The monitor re-checks each one on
# every run, and notifies the assigned field manager(s) the moment its status
# (or issued/expiry date, or any watch_fields) changes.
#
# Required : permit_number, county (must match an id in counties.yaml)
# Optional : project_name, address, category (residential|commercial|industrial),
#            managers (list of field_managers.yaml ids), watch_fields,
#            source_url, active, notes
#
# The permits below are illustrative — replace with your own jobs.

