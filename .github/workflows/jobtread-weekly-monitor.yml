name: JobTread Weekly Monitor

on:
  # Mondays 12:00 UTC = 8 AM EDT (Mar-Nov) / 7 AM EST (Nov-Mar).
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Render PNGs only, skip email send"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      job_numbers:
        description: "Override JOB_NUMBERS for this run (comma-separated)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: jobtread-weekly-monitor
  cancel-in-progress: false

jobs:
  monitor:
    name: Render and email JobTread dashboards
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/jobtread_monitor/requirements.txt

      - name: Install dashboard fonts
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends fonts-dejavu-core

      - name: Install Python dependencies
        run: pip install -r scripts/jobtread_monitor/requirements.txt

      - name: Run JobTread monitor
        env:
          JOBTREAD_GRANT_KEY: ${{ secrets.JOBTREAD_GRANT_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ vars.MAIL_TO || 'office@theidealremodeling.com' }}
          JOB_NUMBERS: ${{ github.event.inputs.job_numbers || vars.JOB_NUMBERS || '2026-343,2026-336' }}
          OUTPUT_DIR: ${{ runner.temp }}/jobtread
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '' }}
        run: python scripts/jobtread_monitor/monitor.py

      - name: Upload dashboards as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jobtread-dashboards-${{ github.run_id }}
          path: ${{ runner.temp }}/jobtread/*.png
          if-no-files-found: ignore
          retention-days: 30
