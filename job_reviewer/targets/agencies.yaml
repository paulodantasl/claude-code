# Government employers in Pasco, Hillsborough, and Pinellas counties (FL)
# that post on governmentjobs.com (NEOGOV).
#
# Each entry:
#   id        — stable internal id
#   name      — display name
#   county    — pasco | hillsborough | pinellas
#   type      — scraper type (governmentjobs)
#   slug      — the {agency} segment in governmentjobs.com/careers/{slug}
#   base_url  — optional explicit careers URL (overrides slug-derived URL)
#   selectors — optional per-agency CSS selector overrides (see scrapers/governmentjobs.py)
#
# ⚠️ SLUG VERIFICATION: governmentjobs.com slugs are not 100% predictable.
# Before the first real run, open https://www.governmentjobs.com/careers/{slug}
# for each agency and confirm it loads that employer's jobs. Fix any slug that
# 404s or set an explicit `base_url`. Agencies marked `verify: true` are the
# ones most likely to need a slug check. (This sandbox can't reach the site, so
# slugs below are best-known values to confirm locally.)

agencies:

  # ── Counties ────────────────────────────────────────────────────────────
  - id: pasco_county
    name: "Pasco County, FL"
    county: pasco
    type: governmentjobs
    slug: pascocountyfl
    verify: true

  - id: hillsborough_county
